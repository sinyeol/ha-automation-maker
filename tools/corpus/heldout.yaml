- id: ho_hard_motion_dim_off
  area: multiclause
  difficulty: hard
  tags: [multiclause, context-inherit, held, diff:hard]
  gold:
    subrules:
      - triggers: [{type: state, entity_id: "binary_sensor.living_room_motion", to: "on"}]
        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_main"]}}]
      - triggers: [{type: state_held, entity_id: "binary_sensor.living_room_motion",
                    to: "off", for: {hours: 0, minutes: 5, seconds: 0}}]
        conditions: []
        actions: [{type: service, action: "light.turn_off",
                   target: {entity_id: ["light.living_room_main"]}}]
  variants:
    - "거실에 움직이면 불 켜고 5분 동안 인기척 없으면 꺼줘"
    - "거실 모션 뜨면 거실 조명 켰다가 5분간 안 움직이면 다시 꺼"

