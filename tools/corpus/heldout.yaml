# heldout.yaml — 정직 지표(held-out) 평가 전용 테스트셋 (SPEC-ACCURACY §0·§1.1)
#
# 목적: 리서치가 수집한 '실사용 자연 문장'에 대해 **사용자 의도 정답(gold)**을 손으로 라벨한
#   평가 전용 코퍼스. 라이브러리(templates/slots/paraphrases) 구축에 **쓰지 않는다**
#   (teaching-to-test 금지). evaluate_hybrid 가 이 파일로 L1/L2/L3 누적 정확도를 측정한다.
#
# 스키마: paraphrases.yaml 의 '명시 gold형'과 동일(augment.load_paraphrases 가 로드).
#   - id / area / difficulty(easy|medium|hard) / tags 부여
#   - gold: subrules 래퍼(구체 엔티티). 상태값은 "on"/"off" 문자열로 인용(YAML bool 회피).
#   - variants: 같은 gold 를 공유하는 자연 문장(어순·조사·존대·표현 변형).
#   entity 는 mock_data 실존 id, mode 는 settings.modes('슬립 모드')만 사용 → 전부
#   validate_rule_model 통과(자체검증). difficulty 는 tags 에도 'diff:*' 로 복제.
#
# 정직성 주의: 여기 문장들은 라이브러리 표면형과 겹치지 않도록 새 어순/축약/구어체로 작성했다.
#   현재 파서(L1)가 상당수를 fail/partial 로 처리하는 것이 정상이며, 그 격차가 정직한 리프트
#   측정의 대상이다.

# ===========================================================================
