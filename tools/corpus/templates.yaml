                   target: {entity_id: ["{device_erv.entity}"]}}]
  slots: [sensor_humidity, humidity_value, device_erv]
  tags: [numeric, above, fan]

- id: numeric_season_temp_ac
  area: numeric
  template: "{season} {sensor_temp}{가} {temp_value} 이상이면 {device_climate}{을} <on>"
