  misparse_note: >-
    '누수' 는 개념어/이름 사전에 표면형이 없어 트리거 센서(binary_sensor.bathroom_moisture)를
    해석하지 못하고, '잠가/꺼' 도 switch 를 turn_off 로 못 내려 트리거 부재로 실패한다.

# ===========================================================================
# SCOPE-EXCLUDE 영역 — 특정 방을 빼고 도메인 전체(손라벨 엔티티 리스트). 현 파서 갭.
# ===========================================================================
- id: scopeexclude_mode_light_off
  area: scope-exclude
  template: "{mode}{가} 켜지면 거실 빼고 모든 조명을 <off>"
  gold:
    subrules:
      - triggers: [{type: mode, mode: "{mode.value}", to: "on"}]
        conditions: []
        actions: [{type: service, action: "light.turn_off",
                   target: {entity_id: ["light.bathroom", "light.entrance",
                     "light.kitchen", "light.master_bedroom", "light.small_room",
                     "light.veranda"]}}]
  slots: [mode]
  tags: [scope-exclude, misparse]
  misparse_note: >-
    '거실 빼고 모든 조명' 은 거실(메인등·무드등)을 제외한 나머지 조명 전체가 정답이지만
    현재 파서는 '빼고' 배제 스코프를 지원하지 않는다(도메인 전체 또는 미해석).
