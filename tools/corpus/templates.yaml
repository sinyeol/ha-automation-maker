        actions: [{type: service, action: "climate.turn_on",
                   target: {entity_id: ["{device_climate.entity}"]}}]
  slots: [season, sensor_temp, temp_value, device_climate]
  tags: [numeric, above, climate, season]

# ===========================================================================
# TIME-RANGE 영역 — 시각 트리거(daily)/시간대·요일 조건.
# ===========================================================================
- id: timerange_daily_light_off
  area: time-range
  template: "밤 11시가 되면 {device_light}{을} <off>"
  gold:
    subrules:
      - triggers: [{type: daily, at: "23:00"}]
        conditions: []
        actions: [{type: service, action: "light.turn_off",
                   target: {entity_id: ["{device_light.entity}"]}}]
  slots: [device_light]
  tags: [time-range, daily-trigger]

- id: timerange_daytype_seg_light
  area: time-range
  template: "{day_type} {segment} {device_light}{을} <on>"
  gold:
    subrules:
      - triggers: [{type: segment, to: "{segment.value}"}]
        conditions: [{type: day_type, types: ["{day_type.value}"]}]
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["{device_light.entity}"]}}]
  slots: [day_type, segment, device_light]
  tags: [time-range, day-type, segment-trigger, misparse]
  misparse_note: >-
    '{segment}' 표면형에 '되면' 전환 표현이 없어(예: '주말에 저녁에 거실 조명을 켜줘')
    파서가 segment 를 트리거로 승격하지 않고 조건(time_segment)으로 읽어 트리거 부재가
    될 수 있다. gold 는 '저녁이 되면'식 전환 의도를 정답으로 둔다.

# ===========================================================================
# COVER 영역 — 커튼/블라인드 열고 닫기(cover.open_cover/close_cover).
