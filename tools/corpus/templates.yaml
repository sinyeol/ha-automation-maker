        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_mood"]}}]
  slots: [motion]
  tags: [target, manual-mapping, misparse]
  misparse_note: >-
    '무드등'은 거실 무드등(light.living_room_mood)을 뜻하지만 개념어/이름 사전에
    표면형이 없어 미해석 → 사용자 수동매핑 유발(파서 unresolved).

# ===========================================================================
# SINGLE 영역 — 기존 v2 골든 회귀(고정 문장, 알려진 정답 gold).
# ===========================================================================
- id: single_golden_1_bathroom_fan_off
  area: single
  template: "화장실은 5분 동안 움직임이 없으면 환풍기와 조명을 꺼줘"
  gold:
    subrules:
      - triggers: [{type: state_held, entity_id: "binary_sensor.bathroom_motion",
                    to: "off", for: {hours: 0, minutes: 5, seconds: 0}}]
        conditions: []
        actions: [{type: service, action: "fan.turn_off",
                   target: {entity_id: ["fan.bathroom_fan"]}},
                  {type: service, action: "light.turn_off",
                   target: {entity_id: ["light.bathroom"]}}]
  slots: []
  tags: [single, regression, held, multi-action]

- id: single_golden_2_arrival_two_persons
