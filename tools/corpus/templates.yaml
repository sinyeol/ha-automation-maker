  gold:
    subrules:
      - triggers: [{type: state, entity_id: "binary_sensor.bathroom_moisture", to: "on"}]
        conditions: []
        actions: [{type: service, action: "switch.turn_off",
                   target: {entity_id: ["{device_switch.entity}"]}}]
  slots: [device_switch]
