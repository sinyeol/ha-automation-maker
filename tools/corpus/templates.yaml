  slots: [motion, device_cover]
  tags: [cover, motion-trigger, open]

# ===========================================================================
# CLIMATE-SET 영역 — 목표 온도 설정(climate.set_temperature). 현 파서 갭(오판).
# ===========================================================================
- id: climateset_temp_target
  area: climate-set
  template: "{sensor_temp}{가} {temp_value} 이상이면 {device_climate}{을} {temp_set}로 설정해줘"
  gold:
    subrules:
      - triggers: [{type: numeric_state, entity_id: "{sensor_temp.entity}",
                    above: "{temp_value.value}"}]
        conditions: []
        actions: [{type: service, action: "climate.set_temperature",
                   target: {entity_id: ["{device_climate.entity}"]},
                   data: {temperature: "{temp_set.value}"}}]
  slots: [sensor_temp, temp_value, device_climate, temp_set]
  tags: [climate-set, set-temperature, misparse]
  misparse_note: >-
    'N도로 설정' 은 climate.set_temperature(목표 온도) 의도지만 현재 파서는 '…로'를
    프리셋(fan_mode)으로 읽어 climate.turn_on + set_fan_mode(fan_mode="24도")로 오판한다.

