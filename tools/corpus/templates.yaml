- id: safety_mode_lock
  area: safety
  template: "{mode}{가} 켜지면 {device_lock}{을} <lock>"
  gold:
    subrules:
      - triggers: [{type: mode, mode: "{mode.value}", to: "on"}]
        conditions: []
        actions: [{type: service, action: "lock.lock",
                   target: {entity_id: ["{device_lock.entity}"]}}]
