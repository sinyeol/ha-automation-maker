  gold:
    subrules:
      - triggers: [{type: segment, to: evening}]
        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_main"]}}]
  slots: []
  tags: [single, regression, segment-trigger]

# ===========================================================================
# NUMERIC 영역 — 수치 임계 트리거(numeric_state above/below) → 냉난방/환기.
# ===========================================================================
- id: numeric_temp_ac_on
  area: numeric
  template: "{sensor_temp}{가} {temp_value} 이상이면 {device_climate}{을} <on>"
  gold:
    subrules:
      - triggers: [{type: numeric_state, entity_id: "{sensor_temp.entity}",
                    above: "{temp_value.value}"}]
        conditions: []
        actions: [{type: service, action: "climate.turn_on",
                   target: {entity_id: ["{device_climate.entity}"]}}]
  slots: [sensor_temp, temp_value, device_climate]
  tags: [numeric, above, climate]

- id: numeric_temp_boiler_on
  area: numeric
  template: "{sensor_temp}{가} {temp_value} 이하이면 {device_boiler}{을} <on>"
  gold:
    subrules:
      - triggers: [{type: numeric_state, entity_id: "{sensor_temp.entity}",
                    below: "{temp_value.value}"}]
        conditions: []
        actions: [{type: service, action: "climate.turn_on",
                   target: {entity_id: ["{device_boiler.entity}"]}}]
  slots: [sensor_temp, temp_value, device_boiler]
  tags: [numeric, below, climate]

- id: numeric_humidity_erv_on
  area: numeric
  template: "{sensor_humidity}{가} {humidity_value} 이상이면 {device_erv}{을} <on>"
