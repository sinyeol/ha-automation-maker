    - "밤 11시가 되면 다 꺼줘"
    - "매일 밤 11시에 불 다 꺼줘"
    - "밤 11시 되면 집안 조명 전부 꺼 줘"

- id: hard_target_except_living
  area: target
  tags: [target-unresolved, scope-except]
  warnings:
    - "'다'의 범위를 조명으로 가정. '거실 빼고' = 거실 소속 조명(메인등·무드등) 제외."
  gold:
    subrules:
      - triggers: [{type: mode, mode: "슬립 모드", to: "on"}]
        conditions: []
        actions:
          - {type: service, action: "light.turn_off",
             target: {entity_id: ["light.bathroom", "light.entrance", "light.kitchen",
                                  "light.master_bedroom", "light.small_room",
                                  "light.veranda"]}}
  variants:
    - "취침모드 켜지면 거실 빼고 다 꺼줘"
    - "슬립모드 켜지면 거실만 놔두고 불 전부 꺼 줘"

- id: hard_target_kidsroom
  area: target
  tags: [target-unresolved]
  warnings:
    - "'아이방'이 어휘에 없음 — 작은방(light.small_room)으로 가정(사용자 확인 필요)."
  gold:
    subrules:
      - triggers: [{type: daily, at: "20:00"}]
        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.small_room"]}}]
  variants:
    - "매일 저녁 8시에 아이방 불 켜줘"

- id: hard_target_mood_evening
  area: target
  tags: [target-unresolved]
  note: "'무드등' — 이름 사전에 없는 별칭형(거실 무드등의 축약)."
  gold:
    subrules:
      - triggers: [{type: segment, to: "evening"}]
        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_mood"]}}]
  variants:
    - "저녁이 되면 무드등 켜줘"

# ===========================================================================
# 2부. 명시 gold 형 — 값 (절반/최대/온도 설정/영하/단위 생략)
# ===========================================================================
- id: hard_value_half
  area: value
  tags: [value, brightness]
  gold:
    subrules:
      - triggers: [{type: segment, to: "evening"}]
        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_main"]},
                   data: {brightness_pct: 50}}]
  variants:
    - "저녁이 되면 거실 조명 밝기 절반으로 해줘"
    - "저녁 되면 거실등 밝기를 절반으로 낮춰줘"

- id: hard_value_max
  area: value
  tags: [value, brightness]
  gold:
    subrules:
      - triggers: [{type: state, entity_id: "binary_sensor.living_room_motion", to: "on"}]
        conditions: []
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_main"]},
                   data: {brightness_pct: 100}}]
  variants:
    - "거실 모션 감지되면 거실등 최대 밝기로 켜줘"
    - "거실 움직임 뜨면 거실 조명 제일 밝게 켜 줘"

- id: hard_value_boiler_settemp
  area: value
  tags: [value, temperature, set-temperature]
  gold:
    subrules:
      - triggers: [{type: numeric_state, entity_id: "sensor.living_room_temperature",
                    below: 20.0}]
        conditions: [{type: season, seasons: ["winter"]}]
        actions: [{type: service, action: "climate.set_temperature",
                   target: {entity_id: ["climate.living_room_boiler"]},
                   data: {temperature: 26}}]
  variants:
    - "겨울에 거실 온도가 20도 아래로 떨어지면 보일러 26도로 맞춰줘"

- id: hard_value_ac_settemp
  area: value
  tags: [value, temperature, set-temperature]
  gold:
    subrules:
      - triggers: [{type: numeric_state, entity_id: "sensor.living_room_temperature",
                    above: 28.0}]
        conditions: []
        actions: [{type: service, action: "climate.set_temperature",
                   target: {entity_id: ["climate.living_room_ac"]},
                   data: {temperature: 26}}]
  variants:
    - "거실 온도 28도 넘으면 에어컨 26도로 해줘"

- id: hard_value_negative
  area: value
  tags: [value, negative-number]
  warnings:
    - "실외 온도 센서 부재 — 거실 온도 센서로 가정(음수 값 '영하 5도' 파싱 검증 목적)."
  gold:
    subrules:
      - triggers: [{type: numeric_state, entity_id: "sensor.living_room_temperature",
                    below: -5.0}]
        conditions: []
        actions: [{type: service, action: "climate.turn_on",
                   target: {entity_id: ["climate.living_room_boiler"]}}]
  variants:
    - "온도가 영하 5도 밑으로 내려가면 보일러 켜줘"

- id: hard_value_bare_number
  area: value
  tags: [value, brightness]
  warnings:
    - "'10'의 단위 생략 — %로 가정."
  gold:
    subrules:
      - triggers: [{type: state, entity_id: "binary_sensor.living_room_motion", to: "on"}]
        conditions: [{type: time_segment, segments: ["dawn"]}]
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_main"]},
                   data: {brightness_pct: 10}}]
  variants:
    - "새벽에 거실 움직임 있으면 거실등 10으로 켜줘"

# ===========================================================================
# 2부. 명시 gold 형 — 시간범위 / 요일
# ===========================================================================
- id: hard_time_range
  area: time
  tags: [time-range]
  note: "'N시부터 M시까지' — 현행 파서는 첫 시각+한 방향(after)만 취해 범위가 유실됨."
  gold:
    subrules:
      - triggers: [{type: state, entity_id: "binary_sensor.living_room_motion", to: "on"}]
        conditions: [{type: time, after: "22:00:00", before: "07:00:00"}]
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.living_room_main"]},
                   data: {brightness_pct: 10}}]
  variants:
    - "밤 10시부터 아침 7시까지 거실에 움직임이 감지되면 거실 조명을 10%로 켜줘"
    - "밤 10시부터 아침 7시 사이에 거실 움직임 뜨면 거실등 10프로로 켜 줘"
    - "밤 10시부터 아침 7시까지는 거실 인기척 감지돼도 거실등 10퍼센트로만 켜줘"

- id: hard_time_weekend
  area: time
  tags: [weekday, day-type]
  gold:
    subrules:
      - triggers: [{type: daily, at: "09:00"}]
        conditions: [{type: day_type, types: ["weekend"]}]
        actions: [{type: service, action: "cover.open_cover",
                   target: {entity_id: ["cover.living_room_curtain"]}}]
  variants:
    - "주말마다 아침 9시에 거실 커튼 열어줘"
    - "주말 아침 9시가 되면 거실 커튼 걷어줘"

- id: hard_time_mwf
  area: time
  tags: [weekday]
  note: "'월수금' 축약 요일 — day_type(주말/평일)에 없는 개별 요일 지정."
  gold:
    subrules:
      - triggers: [{type: daily, at: "07:00"}]
        conditions: [{type: time, weekday: ["mon", "wed", "fri"]}]
        actions: [{type: service, action: "light.turn_on",
                   target: {entity_id: ["light.master_bedroom"]}}]
  variants:
    - "월수금 아침 7시에 안방 불 켜줘"
    - "월요일 수요일 금요일 아침 7시가 되면 안방 조명 켜 줘"

- id: hard_time_weekday_tv
  area: time
  tags: [weekday, day-type]
  gold:
    subrules:
      - triggers: [{type: daily, at: "23:30"}]
        conditions: [{type: day_type, types: ["weekday"]}]
        actions: [{type: service, action: "media_player.turn_off",
                   target: {entity_id: ["media_player.living_room_tv"]}}]
  variants:
    - "평일 밤 11시 반이 되면 티비 꺼줘"
