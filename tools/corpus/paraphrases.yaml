# paraphrases.yaml — 자연 변형 코퍼스 (SPEC-CORPUS §2.3 + 명시 gold 확장)
#
# 목적: 문법 생성(templates.yaml, 템플릿 동형·낙관적)과 달리 실제 사용자가 말할 법한
# 자연스러운 한국어 변형으로 파서의 진짜 커버리지·갭을 드러내는 정직한 테스트셋.
# 이 파일은 '정답셋'이다 — gold 는 파서 출력이 아니라 **사용자 의도**를 기술한다.
#
# 두 가지 항목 형식:
#
# (1) gold_ref 상속형(§2.3): 시드 템플릿의 gold 를 그대로 상속한 자연 변형.
#     - gold_ref: <templates.yaml 의 id>
#       area: <참고용 — 실제 area 는 템플릿에서 상속>
#       bind: {슬롯: 표면형}            # 선택: gold 구체화에 쓸 필러(기본=첫 필러)
#       variants:
#         - "문장"                        # 엔트리 bind 사용
#         - {text: "문장", bind: {...}}   # 변형별 bind override
#     * augment.label_preservation_ok 의 슬롯 앵커링 때문에, 각 변형은 선택된 필러와
#       같은 값/엔티티의 표면 이형태(slots.yaml)를 **연속 부분문자열**로 포함해야 한다.
#       자유 어순/조사 분리형("거실에서 움직임")은 앵커를 깨므로 (2) 명시 gold 형으로 뺐다.
#
# (2) 명시 gold 형(hard cases, §2.3 확장): 한국 가정에서 실제 쓰지만 현재 파서가
#     놓치거나 틀리기 쉬운 표현에 사용자 의도 gold 를 직접 부여.
#     - id: <영문 식별자>
#       area: mode|multiclause|target|time|value|misparse
#       tags: [...]
#       gold: {subrules: [...]}          # 구체 RuleModel(실존 entity_id, "on"/"off" 인용)
#       warnings: ["..."]                # 의도가 모호한 부분 명시(선택)
#       variants: ["문장", ...]
#     * 주의: 현행 augment.load_paraphrases 는 gold_ref 없는 항목을 건너뛴다.
#       파이프라인 편입 시 로더 확장 필요 — entry 에 gold 가 있으면 템플릿 없이
#       CorpusItem 생성(template_id=id, anchors=[], bool→"on"/"off" 정규화 동일 적용).
#
# 결정적(고정 텍스트, 난수 없음). 사용자 문자열 한국어, 식별자 영어.

