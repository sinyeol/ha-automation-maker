# device_boiler — 보일러/난방(heat hint). 실존: climate.living_room_boiler, master_bedroom_boiler.
device_boiler:
  - {surface: "거실 보일러", entity: "climate.living_room_boiler", area: living_room}
  - {surface: "안방 보일러", entity: "climate.master_bedroom_boiler", area: master_bedroom}
  - {surface: "보일러", entity: "climate.living_room_boiler", area: living_room}

# device_cover — 커튼/블라인드. 실존 커버는 거실 커튼 하나(cover.living_room_curtain).
#   '블라인드'는 개념어엔 있으나 실존 엔티티가 커튼뿐이라 거실 커튼으로 매핑.
device_cover:
  - {surface: "거실 커튼", entity: "cover.living_room_curtain", area: living_room}
  - {surface: "커튼", entity: "cover.living_room_curtain", area: living_room}

# device_media — TV. 실존: media_player.living_room_tv.
device_media:
  - {surface: "거실 TV", entity: "media_player.living_room_tv", area: living_room}
  - {surface: "거실 티비", entity: "media_player.living_room_tv", area: living_room}
  - {surface: "TV", entity: "media_player.living_room_tv", area: living_room}
  - {surface: "티비", entity: "media_player.living_room_tv", area: living_room}
  - {surface: "텔레비전", entity: "media_player.living_room_tv", area: living_room}

# device_switch — 콘센트/밸브(switch). 실존: switch.standby_power, switch.gas_valve.
device_switch:
  - {surface: "대기전력 콘센트", entity: "switch.standby_power", area: living_room}
  - {surface: "콘센트", entity: "switch.standby_power", area: living_room}
  - {surface: "가스밸브", entity: "switch.gas_valve", area: kitchen}

# device_lock — 도어락(lock). 실존: lock.entrance_door.
device_lock:
  - {surface: "현관 도어락", entity: "lock.entrance_door", area: entrance}
  - {surface: "도어락", entity: "lock.entrance_door", area: entrance}

# sensor_temp — numeric_state 트리거/조건용 온도 센서 개념(방 이형태).
#   파서는 '거실 온도' 클로즈에서 concept(온도)+area 로 sensor.* 를 해석한다.
sensor_temp:
  - {surface: "거실 온도", entity: "sensor.living_room_temperature", area: living_room}
  - {surface: "안방 온도", entity: "sensor.master_bedroom_temperature", area: master_bedroom}
  - {surface: "주방 온도", entity: "sensor.kitchen_temperature", area: kitchen}

# sensor_humidity — 습도 센서.
sensor_humidity:
  - {surface: "거실 습도", entity: "sensor.living_room_humidity", area: living_room}
  - {surface: "안방 습도", entity: "sensor.master_bedroom_humidity", area: master_bedroom}

# sensor_pm25 — 미세먼지 센서.
sensor_pm25:
  - {surface: "베란다 미세먼지", entity: "sensor.veranda_pm25", area: veranda}

# ---------------------------------------------------------------------------
# motion — 모션/움직임/인기척 이형태 × 방. (트리거 절 "감지되면/작동하면" 용)
#   held(지속) 절 "N분 동안 (모션/움직임)이 없으면" 은 앞 절 센서를 재참조하므로
#   슬롯이 아니라 templates 에서 bare "모션"/"움직임" 으로 쓴다.
# ---------------------------------------------------------------------------
motion:
  - {surface: "거실 모션", entity: "binary_sensor.living_room_motion", area: living_room}
  - {surface: "거실 움직임", entity: "binary_sensor.living_room_motion", area: living_room}
  - {surface: "거실 인기척", entity: "binary_sensor.living_room_motion", area: living_room}
  - {surface: "안방 모션", entity: "binary_sensor.master_bedroom_motion", area: master_bedroom}
  - {surface: "안방 움직임", entity: "binary_sensor.master_bedroom_motion", area: master_bedroom}
  - {surface: "욕실 모션", entity: "binary_sensor.bathroom_motion", area: bathroom}
  - {surface: "욕실 움직임", entity: "binary_sensor.bathroom_motion", area: bathroom}

# ---------------------------------------------------------------------------
# mode — 모든 표면 이형태를 정규명 "슬립 모드" 로 정규화(settings.modes 키와 일치).
# ---------------------------------------------------------------------------
mode:
  - {surface: "슬립 모드", value: "슬립 모드"}
  - {surface: "슬립모드", value: "슬립 모드"}
  - {surface: "취침 모드", value: "슬립 모드"}
  - {surface: "취침모드", value: "슬립 모드"}
  - {surface: "수면 모드", value: "슬립 모드"}
  - {surface: "수면모드", value: "슬립 모드"}
  - {surface: "자기 전 모드", value: "슬립 모드"}
# 주의: DEV settings.modes 에는 '슬립 모드' 하나만 존재하므로 gold 의 mode 값은 전부
#   '슬립 모드' 로 정규화한다. '외출/귀가' 는 별도 모드가 아니라 사람(person)의 zone
#   진입/이탈로 모델링한다(heldout 의 zone/person 영역 참고). 취침/수면/자기전 계열
#   동의어는 파서 mode_surfaces('슬립 모드'/'슬립모드')에 없어 현재는 미인식 갭 신호다.

# ---------------------------------------------------------------------------
# segment — 시간대. 표면형에 처소격(에) 포함, value 는 파서/엔진 키.
# ---------------------------------------------------------------------------
segment:
  - {surface: "새벽에", value: dawn}
  - {surface: "새벽시간에", value: dawn}
  - {surface: "아침에", value: morning}
  - {surface: "낮에", value: day}
  - {surface: "저녁에", value: evening}
  - {surface: "밤에", value: night}

# ---------------------------------------------------------------------------
# day_type — 요일 구분(주말/평일/공휴일). value 는 day_type 노드 키.
# ---------------------------------------------------------------------------
day_type:
  - {surface: "주말에", value: weekend}
  - {surface: "평일에", value: weekday}
  - {surface: "공휴일에", value: holiday}
  - {surface: "휴일에", value: holiday}

# season — 계절 조건.
season:
  - {surface: "봄에", value: spring}
  - {surface: "여름에", value: summer}
  - {surface: "가을에", value: autumn}
  - {surface: "겨울에", value: winter}

# ---------------------------------------------------------------------------
# percent — 밝기/세기. %/퍼센트/프로 이형태.
# ---------------------------------------------------------------------------
percent:
  - {surface: "10%", value: 10}
  - {surface: "10퍼센트", value: 10}
  - {surface: "10프로", value: 10}
  - {surface: "30%", value: 30}
  - {surface: "30퍼센트", value: 30}
  - {surface: "50%", value: 50}
  - {surface: "50프로", value: 50}
  - {surface: "70%", value: 70}
  - {surface: "절반", value: 50}
  - {surface: "최대", value: 100}
  - {surface: "최대로", value: 100}

# ---------------------------------------------------------------------------
# temp_value — numeric_state 임계 온도 표면형 → 값(도). '영하 N도' 는 음수.
#   파서는 find_temperature 로 '28도'/'영하 5도' 를 해석한다.
# ---------------------------------------------------------------------------
temp_value:
  - {surface: "28도", value: 28}
  - {surface: "26도", value: 26}
  - {surface: "30도", value: 30}
  - {surface: "18도", value: 18}
  - {surface: "영하 5도", value: -5}

# temp_set — climate.set_temperature 목표 온도(설정값).
temp_set:
  - {surface: "24도", value: 24}
  - {surface: "26도", value: 26}
  - {surface: "22도", value: 22}
  - {surface: "20도", value: 20}

# humidity_value — 습도 임계값(%).
humidity_value:
  - {surface: "60%", value: 60}
  - {surface: "40%", value: 40}
  - {surface: "70%", value: 70}

# pm25_value — 미세먼지 임계값(㎍/㎥).
pm25_value:
  - {surface: "35", value: 35}
  - {surface: "75", value: 75}

# ---------------------------------------------------------------------------
# duration — 지속시간 표면형 → dur 객체(hours/minutes/seconds). "N분 동안" 절에서 사용.
# ---------------------------------------------------------------------------
duration:
  - {surface: "3분", dur: {hours: 0, minutes: 3, seconds: 0}}
  - {surface: "5분", dur: {hours: 0, minutes: 5, seconds: 0}}
  - {surface: "10분", dur: {hours: 0, minutes: 10, seconds: 0}}
  - {surface: "30분", dur: {hours: 0, minutes: 30, seconds: 0}}

# ---------------------------------------------------------------------------
# scope — 스코프 전개. "{scope.expand}" 는 문맥 도메인(여기선 light) 전체 entity_id 로
#   확장(evaluate 가 인벤토리로 계산). "모든" 만 파서가 스코프로 인식,
#   "전부"/"다" 는 의도적 오판 유발(파서가 스코프로 안 봄).
# ---------------------------------------------------------------------------
scope:
  - {surface: "모든", expand: true}
  - {surface: "집의 모든", expand: true}
  - {surface: "집안 모든", expand: true}
  - {surface: "전체", expand: true}
  - {surface: "전부", expand: true}
  - {surface: "다", expand: true}
# 주의: '{scope.expand}' 는 문맥 도메인(액션 대상 기기, device_* 슬롯) 전체로 전개된다
#   (generate.py 골드버그 교정 반영). '빼고/제외' 스코프 배제는 도메인-전체에서 특정 방을
#   빼야 하므로 자동 전개로 표현 불가 → templates 의 scope-exclude 영역과 heldout 에서
#   손라벨(엔티티 리스트 명시)로 다룬다.

# ---------------------------------------------------------------------------
# connective_pair — 다중 규칙 경계·액션 연결 이형태(§2.1). templates 인라인 참고용.
# ---------------------------------------------------------------------------
connective_pair:
  - {surface: "켜주고", kind: action_then_boundary}
  - {surface: "꺼주고", kind: action_then_boundary}
  - {surface: "켜고", kind: action_then_boundary}
