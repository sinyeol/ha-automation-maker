  - {surface: "무드등", entity: "light.living_room_mood", area: living_room}
  - {surface: "무드 조명", entity: "light.living_room_mood", area: living_room}

# ---------------------------------------------------------------------------
# device_fan / device_climate — 환풍기·에어컨(실존 엔티티 소수)
# ---------------------------------------------------------------------------
device_fan:
  - {surface: "욕실 환풍기", entity: "fan.bathroom_fan", area: bathroom}
  - {surface: "욕실 환기팬", entity: "fan.bathroom_fan", area: bathroom}
  - {surface: "환풍기", entity: "fan.bathroom_fan", area: bathroom}

# device_erv — 전열교환기(베란다, 이름 매칭이라 방 없이도 명확). 습도/미세먼지 환기 액션용.
device_erv:
  - {surface: "전열교환기", entity: "fan.veranda_erv", area: veranda}
