# pattern_library.yaml — L2 템플릿 매처 데이터 자산(앱 동봉, read-only).
#
# tools/corpus/templates.yaml 를 **현재 앱 파서**(backend.nl.parser.parse)로 평가해
# covered/partial 골격만 증류한 것이다(APP-PORT-PLAN §4.1 / S9). 각 항목: template(문형)
# + gold(정답 골격) + slots + examples(grammar exact 예시). held-out 오염 0(블랙리스트 검사).
# 재생성: python tools/corpus/export_app_library.py
# 상태분포(앱 파서): {'covered': 21, 'partial': 24, 'gap': 4, 'unknown': 0} · 편입(covered+partial) 45개.
- id: mode_trig_on_light
  area: mode
  template: '{mode}{가} 켜지면 {device_light}{을} <on>'
  slots:
  - mode
  - device_light
  tags:
  - mode-trigger
  status: partial
  gold:
    subrules:
    - triggers:
      - type: mode
        mode: '{mode.value}'
        to: 'on'
      conditions: []
      actions:
      - type: service
        action: light.turn_on
        target:
          entity_id:
          - '{device_light.entity}'
  examples:
  - 슬립모드가 켜지면 부엌 조명을 틀어줘
  - 수면 모드가 켜지면 화장실 조명을 켜줘
  - 수면모드가 켜지면 작은방 조명을 켜
