- id: multiclause_seg_dim_off
  area: multiclause
  template: '{segment} {motion}{가} 작동하면 {device_light}{을} {percent} 켜주고 {duration}
    동안 움직임이 없으면 <off>'
  slots:
  - segment
  - motion
  - device_light
  - percent
  - duration
  tags:
  - multiclause
  - context-inherit
  - time-segment
  status: partial
  gold:
    subrules:
    - triggers:
      - type: state
        entity_id: '{motion.entity}'
        to: 'on'
      conditions:
      - type: time_segment
        segments:
        - '{segment.value}'
      actions:
      - type: service
        action: light.turn_on
        target:
          entity_id:
          - '{device_light.entity}'
        data:
          brightness_pct: '{percent.value}'
    - triggers:
      - type: state_held
        entity_id: '{motion.entity}'
        to: 'off'
        for: '{duration.dur}'
      conditions: []
      actions:
      - type: service
        action: light.turn_off
        target:
          entity_id:
          - '{device_light.entity}'
  examples:
  - 밤에 욕실 움직임이 작동하면 거실 전등을 최대로 켜주고 5분 동안 움직임이 없으면 끄다
  - 새벽시간에 거실 모션이 작동하면 메인등을 50% 켜주고 10분 동안 움직임이 없으면 끄다
  - 저녁에 욕실 모션이 작동하면 작은방 조명을 절반 켜주고 30분 동안 움직임이 없으면 꺼줘
